services:
  db:
    image: postgres:18
    container_name: cbam-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbam_db}
      POSTGRES_USER: ${POSTGRES_USER:-cbam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-cbam_user} -d ${POSTGRES_DB:-cbam_db}
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cbam-net

  api:
    build:
      context: .
    container_name: cbam-api
    ports:
      - "${API_PORT:-18020}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cbam_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cbam_db}
      APP_NAME: ${APP_NAME:-DocumentAnalyserAPI}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cbam-net

volumes:
  pgdata:

networks:
  cbam-net:
    driver: bridge
